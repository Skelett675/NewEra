<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - NewEra</title>
    <link rel="stylesheet" href="./styles.css">
</head>

<body>

<nav class="navbar">
    <div class="logo">NewEra</div>

    <ul class="nav-links">
        <li><a href="index.html">← Zurück</a></li>
    </ul>
</nav>

<section class="hero">

<div class="login-box big">

    <h2>NewEra Login System</h2>

    <p>Registrieren oder einloggen mit Discord ID</p>

    <input id="discordId" placeholder="Discord ID (z.B. 1234567890)">
    <input id="password" type="password" placeholder="Passwort">

    <button class="cta-button" onclick="register()">Registrieren</button>
    <button class="cta-button secondary" onclick="login()">Login</button>

    <p id="status"></p>

</div>

</section>

<script>
let users = JSON.parse(localStorage.getItem("users") || "{}");

// REGISTER
function register() {
    const id = document.getElementById("discordId").value;
    const pw = document.getElementById("password").value;

    if(!id || !pw){
        document.getElementById("status").innerText = "Bitte alles ausfüllen";
        return;
    }

    if(users[id]){
        document.getElementById("status").innerText = "Account existiert schon";
        return;
    }

    users[id] = pw;
    localStorage.setItem("users", JSON.stringify(users));

    document.getElementById("status").innerText = "Account erstellt!";
}

// LOGIN
function login() {
    const id = document.getElementById("discordId").value;
    const pw = document.getElementById("password").value;

    if(users[id] === pw){
        document.getElementById("status").innerText = "Login erfolgreich!";
    } else {
        document.getElementById("status").innerText = "Falsche Daten!";
    }
}
</script>

</body>
</html>
