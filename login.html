<!DOCTYPE html>

</head>

<body>

<!-- NAV -->
<nav class="navbar">
    <div class="nav-container">

        <div class="logo">NewEra</div>

        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>

<!-- LOGIN -->
<section class="hero">

    <div class="login-box">

        <h2>Discord Login</h2>

        <p>🔐 Login funktioniert nur wenn der Bot online ist</p>

        <input id="discordId" placeholder="Discord ID">
        <input id="password" type="password" placeholder="Passwort">

        <button class="cta-button" onclick="login()">
            Einloggen
        </button>

        <p id="status"></p>

    </div>

</section>

<script>
async function login() {

    const discordId = document.getElementById("discordId").value;
    const password = document.getElementById("password").value;

    const res = await fetch("http://192.168.178.168:3000/check-login", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ discordId, password })
    });

    const data = await res.json();

    document.getElementById("status").innerText = data.message;
}
</script>

</body>
