<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="login-box big">

    <h2>NewEra Login</h2>

    <input id="discordId" placeholder="Discord ID">
    <input id="password" type="password" placeholder="Passwort">

    <button onclick="login()" class="cta-button">Login</button>
    <button onclick="register()" class="cta-button">Register</button>

    <p id="msg"></p>

</div>

<script>
async function login() {
    const discordId = document.getElementById("discordId").value;
    const password = document.getElementById("password").value;

    const res = await fetch("/login", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ discordId, password })
    });

    const data = await res.json();

    document.getElementById("msg").innerText =
        data.success ? "OK Login" : data.message;
}

async function register() {
    const discordId = document.getElementById("discordId").value;
    const password = document.getElementById("password").value;

    const res = await fetch("/register", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ discordId, password })
    });

    const data = await res.json();

    document.getElementById("msg").innerText =
        data.success ? "Account erstellt" : data.message;
}
</script>

</body>
</html>
