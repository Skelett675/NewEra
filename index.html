<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NewEra</title>

    <link rel="stylesheet" href="styles.css">

    <link rel="icon" href="favicon.png?v=2">
</head>
<body>

<nav class="navbar">
    <div class="logo">NewEra</div>
</nav>

<section class="features">

    <div class="feature-card">

        <h2>Discord Login</h2>

        <p>
            ⚠️ Funktioniert nur wenn der Bot online ist.<br>
            Der Bot ist NICHT 24/7 aktiv.
        </p>

        <input id="discordId" placeholder="Discord ID eingeben">

        <button onclick="login()">Login starten</button>

        <p id="status"></p>
    </div>

</section>

<script>
async function login() {
    const id = document.getElementById("discordId").value;

    const res = await fetch("http://DEINE_PI_IP:3000/login", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ discordId: id })
    });

    const data = await res.json();
    document.getElementById("status").innerText = data.message;
}
</script>

</body>
</html>
